summaryCards: 
  - title: Проблема
    text: "Текущий процесс управления ассортиментом имеет слабый контроль. Нет полной картины, какие товары в каких торговых точках должны присутствовать. Есть много отклонений, ассортимент слабо кластеризирован, много исключений, что затрудняет работу мерчандайзинга, операционного отдела, УТЗ и коммерции."
  - title: Гипотеза
    text: "Если внедрить ABM Assortment, процесс управления ассортиментом станет прозрачнее, будут устранены проблемные места и ручные ошибки. Продукт позволит стандартизировать ассортимент, поддерживать его в порядке и вести полную информацию о том, какие товары должны быть в ассортименте и доступны к заказу."
  - title: Решение сейчас
    text: "Ожидать доработки от подрядчика. После готовности функционала принять его, подтвердить пилотный контур, правила кластеризации, интеграции и критерии перехода к масштабированию."
    decision: true
effectCards: 
  - title: Ожидаемый эффект
    list: 
      - Снижение количества ошибок при управлении ассортиментом.
      - "Снижение случаев, когда товар забыли ввести в ассортимент."
      - "Снижение случаев, когда товар завели, но не разместили на планограмме."
      - "Снижение случаев, когда товар завели, но не заказали."
      - Формирование кластеров и упрощение управления ассортиментом.
      - Снижение затрат времени категорийных менеджеров на контроль.
      - Появление единого «места правды» для всех участников процесса.
      - Возможность оценивать эффективность ассортиментных матриц.
  - title: Ключевые риски
    list: 
      - Разрозненный ассортимент и оборудование могут привести к длительному выравниванию данных.
      - Подрядчик может не реализовать функционал кластеризации.
      - Подрядчик может не реализовать обмен статусами с планограммами.
      - Возможны сложности синхронизации с PlanoHero.
      - Возможны сложности загрузки матриц в 1С.
  - title: Следующий шаг
    text: "Получить от подрядчика доработанный функционал, проверить возможность кластеризации и синхронизации с планограммами, согласовать KPI пилота, состав данных, роли и календарный план."
criteriaCards: 
  - title: Success Criteria
    text: "Для форматов «Рулька», «Щедрик» и Cash&Carry выполнена чистка ассортимента и группирование в кластеры в соответствии с фактическим оборудованием. Получены матрицы наличия товаров в магазинах сети, сформированы матрицы типовых форматов и получен рабочий инструмент ведения ассортиментных матриц."
  - title: Stop Criteria
    text: Подрядчик отказывается от создания функционала кластеризации и алгоритма синхронизации с планограммами либо решение не позволяет обеспечить корректное ведение ассортиментных матриц.
gates: 
  - code: Gate 0
    title: Гипотеза и бизнес-логика подтверждены
    description: "Есть паспорт проекта, определён владелец и заказчик, согласован пилотный контур, утверждена команда."
    owner: Заказчик / Владелец продукта / PMO
  - code: Gate 1
    title: Пилотные проекты согласованы
    description: "Определены пилотные ТТ, регион, роли, KPI пилота и состав данных."
    owner: Спонсор / Владелец проекта
  - code: Gate 2
    title: Интеграция проведена
    description: Стабильно передаются и принимаются чистые данные.
    owner: Владелец проекта / PMO / IT
  - code: Gate 3
    title: Функционал доступен для наполнения
    description: "Запущено приложение ABM, проведено обучение, принято решение: масштабировать, доработать или остановить."
    owner: Владелец проекта / PMO / IT
  - code: Gate 4
    title: Готовы матрицы по всем ТТ
    description: Данные проверены и сходятся с реальной картиной на торговых точках.
    owner: Спонсор / Заказчик / Владелец проекта
  - code: Gate 5
    title: Реализован процесс взаимодействия с PlanoHero
    description: "Процесс работает стабильно, персонал обучен."
    owner: Спонсор / Заказчик
  - code: Gate 6
    title: Матрицы загружены в систему 1С
    description: Стабильно передаются и принимаются чистые данные.
    owner: Владелец проекта / PMO / IT
