<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Паспорт проекта Yieldigo — редактор</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#152033;--muted:#65738a;--line:#dce3ee;--accent:#175cd3;--accent-soft:#e8f1ff;--green:#067647;--green-soft:#e7f8ef;--amber:#b54708;--amber-soft:#fff3e0;--red:#b42318;--red-soft:#fff0ee;--shadow:0 10px 30px rgba(21,32,51,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;line-height:1.45}.page{max-width:1180px;margin:0 auto;padding:28px}.toolbar{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:-28px -28px 18px;padding:12px 28px;background:rgba(245,247,251,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}.toolbar-left,.toolbar-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button,.file-label{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:8px 12px;font-size:13px;font-weight:750;cursor:pointer;box-shadow:0 2px 8px rgba(21,32,51,.05)}button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}input[type=file]{display:none}.status{color:var(--muted);font-size:12px;font-weight:700;max-width:520px}[contenteditable=true]{outline:2px solid transparent;border-radius:8px;transition:.15s}[contenteditable=true]:hover{background:rgba(23,92,211,.06)}[contenteditable=true]:focus{outline-color:rgba(23,92,211,.45);background:#eef5ff;color:var(--ink);padding-left:6px;padding-right:6px}.hero [contenteditable=true]:hover{background:rgba(255,255,255,.16)}.hero [contenteditable=true]:focus{outline-color:rgba(255,255,255,.9);background:rgba(255,255,255,.94);color:var(--ink)}.hero{background:linear-gradient(135deg,#0b3b8c 0%,#175cd3 52%,#2e90fa 100%);color:#fff;border-radius:24px;padding:30px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.12)}.eyebrow{display:inline-flex;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.92}h1{margin:10px 0;font-size:clamp(28px,4vw,46px);line-height:1.05;letter-spacing:-.04em}.hero p{max-width:820px;margin:0;color:rgba(255,255,255,.88);font-size:17px}.meta-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:22px}.meta{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:12px 14px}.meta .label{display:block;color:rgba(255,255,255,.72);font-size:12px;margin-bottom:4px}.meta .value{font-weight:750;font-size:14px}.section{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow)}.section-title{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}h2{margin:0;font-size:22px;letter-spacing:-.02em}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;white-space:nowrap}.blue{color:var(--accent);background:var(--accent-soft)}.green{color:var(--green);background:var(--green-soft)}.amber{color:var(--amber);background:var(--amber-soft)}.red{color:var(--red);background:var(--red-soft)}.grid-2{display:grid;grid-template-columns:1.45fr 0.85fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}.card h3{margin:0 0 10px;font-size:15px}.card p{margin:0;color:var(--muted)}.list{margin:0;padding-left:18px;color:var(--muted)}.list li{margin:7px 0}.info-table{width:100%;border-collapse:collapse;font-size:14px}.info-table th,.info-table td{border-bottom:1px solid var(--line);padding:11px 12px;text-align:left;vertical-align:top}.info-table th{width:28%;color:var(--muted);font-weight:700;background:#f8fafc}.gates{display:grid;gap:10px}.gate{display:grid;grid-template-columns:82px 1fr 1.4fr 190px;gap:10px;align-items:start;border:1px solid var(--line);border-radius:16px;padding:12px;background:#fff;font-size:13px}.gate-code{display:inline-flex;justify-content:center;align-items:center;border-radius:12px;background:var(--accent-soft);color:var(--accent);font-weight:800;padding:8px}.muted{color:var(--muted)}.decision{border-left:5px solid var(--green);background:linear-gradient(90deg,var(--green-soft),#fff 70%)}.questions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;counter-reset:q}.question{counter-increment:q;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff;color:var(--muted)}.question:before{content:counter(q);display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;margin-right:8px}.footer{margin-top:18px;color:var(--muted);font-size:12px;text-align:center}@media(max-width:900px){.meta-grid,.grid-2,.grid-3,.questions{grid-template-columns:1fr}.gate{grid-template-columns:1fr}.page{padding:16px}.toolbar{margin:-16px -16px 16px;padding:12px 16px}}@media print{.toolbar{display:none!important}body{background:#fff}.page{max-width:none;padding:0}.section,.hero{box-shadow:none;break-inside:avoid}.hero{border-radius:0}}
  </style>
</head>
<body>
<main class="page">
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="backToPanelBtn" type="button" style="display:none">← Панель</button>
      <button id="saveBtn" class="primary" type="button">Сохранить в файл</button>
      <button id="downloadBtn" type="button">Скачать YAML</button>
      <label class="file-label" for="fileInput">Открыть YAML</label>
      <input id="fileInput" type="file" accept=".yaml,.yml,.json,text/plain,application/json,text/yaml" />
      <button id="printBtn" type="button">Печать / PDF</button>
    </div>
    <div class="toolbar-right"><span id="passportLabel" class="status" style="display:none;font-weight:800;color:var(--accent)"></span><span id="status" class="status">Готово</span></div>
  </div>

  <section class="hero">
    <div class="eyebrow" data-path="eyebrow" contenteditable="true"></div>
    <h1 data-path="title" contenteditable="true"></h1>
    <p data-path="subtitle" contenteditable="true"></p>
    <div id="metaGrid" class="meta-grid"></div>
  </section>

  <section class="section"><div class="section-title"><h2 data-path="sections.identification.title" contenteditable="true"></h2><span class="tag blue" data-path="sections.identification.tag" contenteditable="true"></span></div><div class="grid-2"><div class="card"><table id="projectInfo" class="info-table"></table></div><div class="card"><table id="rolesInfo" class="info-table"></table></div></div></section>
  <section class="section"><div class="section-title"><h2 data-path="sections.summary.title" contenteditable="true"></h2><span class="tag green" data-path="sections.summary.tag" contenteditable="true"></span></div><div id="summaryCards" class="grid-3"></div><div id="effectCards" class="grid-3" style="margin-top:16px"></div></section>
  <section class="section"><div class="section-title"><h2 data-path="sections.criteria.title" contenteditable="true"></h2><span class="tag amber" data-path="sections.criteria.tag" contenteditable="true"></span></div><div id="criteriaCards" class="grid-2"></div></section>
  <section class="section"><div class="section-title"><h2 data-path="sections.gates.title" contenteditable="true"></h2><span class="tag blue" data-path="sections.gates.tag" contenteditable="true"></span></div><div id="gatesList" class="gates"></div></section>
  <section class="section"><div class="section-title"><h2 data-path="sections.documents.title" contenteditable="true"></h2><span class="tag blue" data-path="sections.documents.tag" contenteditable="true"></span></div><div id="documentsGrid" class="grid-2"></div></section>
  <section class="section"><div class="section-title"><h2 data-path="sections.questions.title" contenteditable="true"></h2><span class="tag red" data-path="sections.questions.tag" contenteditable="true"></span></div><div id="questionsList" class="questions"></div></section>
  <div class="footer" data-path="footer" contenteditable="true"></div>
</main>

<script>
const STORAGE_KEY='yieldigo_passport_stable_v1';
const FILE_NAME='y.yaml';
const defaultData={eyebrow:'Project Passport · Pricing Transformation',title:'Внедрение системы рекомендаций и управления ценами Yieldigo',subtitle:'Чистая версия паспорта проекта для согласования пилота: фокус на управляемом ценообразовании, снижении ручных ошибок, повышении маржинальности и масштабировании pricing-процесса без Excel как основного операционного контура.',meta:[{label:'Статус',value:'Черновик для согласования'},{label:'Версия / дата',value:'v1.0 · 01.04.2026'},{label:'Контур пилота',value:'Dry Food · Розница · Cash&Carry'},{label:'Решение',value:'Запуск пилота Yieldigo'}],sections:{identification:{title:'1. Идентификация проекта',tag:'Project Setup'},summary:{title:'2. Executive Summary',tag:'Для решения о запуске'},criteria:{title:'3. Критерии успеха и остановки',tag:'Pilot Control'},gates:{title:'4. Stage Gate модель',tag:'Governance'},documents:{title:'5. Базовый пакет проектной документации',tag:'Navigation'},questions:{title:'6. Вопросы перед запуском',tag:'Open Points'}},projectInfo:[{label:'Название проекта',value:'Внедрение программы рекомендаций и ведения цен Yieldigo'},{label:'Цель',value:'Этап I: внедрить инструмент управления и рекомендации регулярных цен.\nЭтап II: внедрить механику оптовых цен / multibuy.\nЭтап III: внедрить модуль акционных цен.'},{label:'Объект пилота',value:'Розница: магазины «Рулька» и «Щедрик». Опт: Cash&Carry Охтирка 287. Категории: Dry Food.'},{label:'Горизонт пилота',value:'Требует финального согласования после утверждения плана пилота и состава KPI.'}],rolesInfo:[{label:'Инициатор',value:'Парамонов Денис'},{label:'Заказчик',value:'Мартынов Денис'},{label:'Спонсор',value:'Парамонов Денис'},{label:'Владелец проекта',value:'Пашко Ольга'},{label:'Ментор',value:'Пашко Ольга'},{label:'PMO',value:'Виталий Воробьёв'},{label:'РМ',value:'Пашко Ольга'}],summaryCards:[{title:'Проблема',text:'Текущий процесс управления ценами недостаточно системный: цены меняются несвоевременно, часть прибыли теряется, выравнивание под конкурентов не контролируется, ручные операции создают ошибки, а причины изменения цены и результат сложно отследить.'},{title:'Гипотеза',text:'Если внедрить Yieldigo как инструмент рекомендаций и управления ценами, процесс станет прозрачнее, сократятся ручные ошибки, повысится выторг, маржинальность и лояльность клиентов, а масштабирование бизнеса станет управляемее.'},{title:'Решение сейчас',text:'Согласовать запуск пилота Yieldigo в утверждённом контуре Dry Food, определить роли владельцев pricing-процесса, подтвердить состав данных, KPI пилота и правила перехода к масштабированию после подтверждённого эффекта.',decision:true}],effectCards:[{title:'Ожидаемый эффект',list:['Снижение количества ошибок при смене цен.','Рекомендация оптимальных цен системой.','Автоматизированное выравнивание под конкурентов для выбранных позиций.','Снижение нагрузки на категорийных менеджеров.','Появление прозрачной истории: кто, что и зачем изменил.','Рост маржинальности и клиентской лояльности.','Снижение нагрузки на торговые точки при смене ценников.']},{title:'Ключевые риски',list:['Низкое качество исходных данных по ценам, продажам и истории изменений.','Неустойчивый процесс ведения номенклатуры, складов и ассортимента.','Отсутствие утверждённых политик акционной деятельности.','Отсутствие утверждённых политик оптовых продаж.','Несогласованная методика мониторинга цен конкурентов.','Сложности синхронизации цен между Fresh и Dry Food.']},{title:'Следующий шаг',text:'Принять решение о запуске Yieldigo для пилотного контура Dry Food, утвердить KPI, ответственных, состав данных, календарный план и критерии масштабирования.'}],criteriaCards:[{title:'Success Criteria',text:'Для форматов «Рулька», «Щедрик» и Cash&Carry ценообразование переводится на управляемую модель через Yieldigo. Система показывает стабильную работу, рекомендации применимы бизнесом, KPI пилота достигнуты, а процесс не зависит от Excel как основного инструмента управления.'},{title:'Stop Criteria',text:'Новая модель приводит к снижению прибыльности, создаёт неконтролируемые ошибки в ценах, не принимается бизнес-пользователями или не может быть поддержана из-за качества данных и интеграционных ограничений.'}],gates:[{code:'Gate 0',title:'Гипотеза подтверждена',description:'Есть паспорт проекта, определён владелец и заказчик, согласован пилотный контур.',owner:'Заказчик / Product Owner / PMO'},{code:'Gate 1',title:'Пилот согласован',description:'Определены пилотные ТТ, регион, роли, KPI пилота и состав данных.',owner:'Спонсор / Владелец проекта'},{code:'Gate 2',title:'Интеграция проведена',description:'Данные стабильно передаются, принимаются и проходят контроль качества.',owner:'IT'},{code:'Gate 3',title:'Пилот multibuy запущен',description:'Запущен модуль multibuy, проведено обучение, принято решение: масштабировать, доработать или остановить.',owner:'Владелец проекта / PMO / IT'},{code:'Gate 4',title:'Пилот регулярных цен запущен',description:'Данные очищены, модуль работает, KPI пилота отслеживаются и подтверждаются.',owner:'Спонсор / Заказчик / Владелец проекта'},{code:'Gate 5',title:'Регулярное ценообразование масштабировано',description:'Запущено регулярное ценообразование на всех согласованных магазинах, принято решение двигаться дальше.',owner:'Спонсор / Заказчик'},{code:'Gate 6',title:'Интеграция акционного модуля',description:'Данные по акциям стабильно передаются, принимаются и контролируются.',owner:'IT'},{code:'Gate 7',title:'Пилот акционных цен',description:'Запущен пилот акционных цен, принято решение: масштабировать, доработать или остановить.',owner:'Спонсор / Заказчик'},{code:'Gate 8',title:'Модуль акций масштабирован',description:'Акционный модуль запущен для всех согласованных магазинов и категорий.',owner:'Спонсор / Заказчик'}],documents:{listTitle:'Документы проекта',list:['Заявка на инициативу','Карта бизнес-требований','Экономический эффект','Risks & Assumptions','Decision Log','BRD Level 1 — бизнес-контур процесса','BRD Level 2 — процессные сценарии','BRD Level 3 — сущности и модель данных','AS-IS текущего процесса управления ценами','План пилота'],conclusionTitle:'Главный вывод',conclusionText:'Текущий процесс управления ценообразованием сложен с точки зрения системности, контроля и масштабирования. Yieldigo должен стать инструментом перехода к управляемому pricing-процессу с прозрачными правилами, KPI, ответственными ролями и контролем результата.'},questions:['Подтверждаем ли мы эффективность системы после тестовых запусков?','Как будет осуществляться управление акциями до запуска модуля акций?','Какие KPI и baseline фиксируем как обязательные для решения о масштабировании?'],footer:'SMK Group · Project Passport · Yieldigo Pricing System · Editable YAML version'};
const HANDOFF_KEY='passport_handoff';const CURRENT_KEY='passport_editor_current';let timer=null;let storageKey=STORAGE_KEY;let currentPassport=null;let data;initPassport();
function clone(v){return JSON.parse(JSON.stringify(v))}
function loadSafe(){try{const s=localStorage.getItem(STORAGE_KEY);return s?normalize(parseData(s)):clone(defaultData)}catch(e){return clone(defaultData)}}
function normalize(input){const base=clone(defaultData);if(!input||typeof input!=='object'||Array.isArray(input))return base;return merge(base,input)}
function merge(base,incoming){if(Array.isArray(base))return Array.isArray(incoming)&&incoming.length?incoming:base;if(base&&typeof base==='object'){const r=clone(base);if(incoming&&typeof incoming==='object'&&!Array.isArray(incoming)){Object.keys(incoming).forEach(k=>{r[k]=k in r?merge(r[k],incoming[k]):incoming[k]})}return r}return incoming===undefined||incoming===null||incoming===''?base:incoming}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function br(v){return esc(v).replace(/\n/g,'<br>')}
function get(path){return path.split('.').reduce((o,k)=>o&&o[k],data)}
function set(path,value){const keys=path.split('.');const last=keys.pop();const target=keys.reduce((o,k)=>o[k],data);target[last]=value}
function render(){data=normalize(data);document.querySelectorAll('[data-path]').forEach(el=>{el.innerText=get(el.dataset.path)||''});meta();table('projectInfo',data.projectInfo,'projectInfo');table('rolesInfo',data.rolesInfo,'rolesInfo');cards('summaryCards',data.summaryCards,'summaryCards');cards('effectCards',data.effectCards,'effectCards');cards('criteriaCards',data.criteriaCards,'criteriaCards');gates();documents();questions();bind()}
function meta(){document.getElementById('metaGrid').innerHTML=data.meta.map((x,i)=>`<div class="meta"><span class="label" contenteditable="true" data-array="meta" data-index="${i}" data-prop="label">${esc(x.label)}</span><span class="value" contenteditable="true" data-array="meta" data-index="${i}" data-prop="value">${esc(x.value)}</span></div>`).join('')}
function table(id,rows,name){document.getElementById(id).innerHTML=rows.map((r,i)=>`<tr><th contenteditable="true" data-array="${name}" data-index="${i}" data-prop="label">${esc(r.label)}</th><td contenteditable="true" data-array="${name}" data-index="${i}" data-prop="value">${br(r.value)}</td></tr>`).join('')}
function cards(id,rows,name){document.getElementById(id).innerHTML=rows.map((c,i)=>`<div class="card ${c.decision?'decision':''}"><h3 contenteditable="true" data-array="${name}" data-index="${i}" data-prop="title">${esc(c.title)}</h3>${Array.isArray(c.list)?`<ul class="list">${c.list.map((x,j)=>`<li contenteditable="true" data-array="${name}" data-index="${i}" data-list-index="${j}">${esc(x)}</li>`).join('')}</ul>`:`<p contenteditable="true" data-array="${name}" data-index="${i}" data-prop="text">${esc(c.text)}</p>`}</div>`).join('')}
function gates(){document.getElementById('gatesList').innerHTML=data.gates.map((g,i)=>`<div class="gate"><div class="gate-code" contenteditable="true" data-array="gates" data-index="${i}" data-prop="code">${esc(g.code)}</div><div><strong contenteditable="true" data-array="gates" data-index="${i}" data-prop="title">${esc(g.title)}</strong></div><div class="muted" contenteditable="true" data-array="gates" data-index="${i}" data-prop="description">${esc(g.description)}</div><div class="muted" contenteditable="true" data-array="gates" data-index="${i}" data-prop="owner">${esc(g.owner)}</div></div>`).join('')}
function documents(){document.getElementById('documentsGrid').innerHTML=`<div class="card"><h3 contenteditable="true" data-path="documents.listTitle">${esc(data.documents.listTitle)}</h3><ul class="list">${data.documents.list.map((x,i)=>`<li contenteditable="true" data-doc-index="${i}">${esc(x)}</li>`).join('')}</ul></div><div class="card"><h3 contenteditable="true" data-path="documents.conclusionTitle">${esc(data.documents.conclusionTitle)}</h3><p contenteditable="true" data-path="documents.conclusionText">${esc(data.documents.conclusionText)}</p></div>`}
function questions(){document.getElementById('questionsList').innerHTML=data.questions.map((x,i)=>`<div class="question" contenteditable="true" data-question-index="${i}">${esc(x)}</div>`).join('')}
function bind(){document.querySelectorAll('[contenteditable=true]').forEach(el=>{el.oninput=()=>{const v=el.innerText.replace(/\u00a0/g,' ').trim();if(el.dataset.path)set(el.dataset.path,v);if(el.dataset.array){const t=data[el.dataset.array][Number(el.dataset.index)];if(el.dataset.listIndex!==undefined)t.list[Number(el.dataset.listIndex)]=v;if(el.dataset.prop)t[el.dataset.prop]=v}if(el.dataset.docIndex!==undefined)data.documents.list[Number(el.dataset.docIndex)]=v;if(el.dataset.questionIndex!==undefined)data.questions[Number(el.dataset.questionIndex)]=v;schedule()}})}
function schedule(){status('Есть несохранённые изменения...');clearTimeout(timer);timer=setTimeout(saveDraft,600)}
function saveDraft(){try{localStorage.setItem(storageKey,toYaml(data));status('Черновик сохранён в браузере: '+new Date().toLocaleTimeString('ru-RU'))}catch(e){status('Есть изменения. Черновик в браузере не сохранён: '+e.message)}}
async function save(){
  clearTimeout(timer);
  const y=toYaml(data);
  try{localStorage.setItem(storageKey,y)}catch(e){}
  try{
    const fh=await getPassportFileHandleForWrite();
    const writable=await fh.createWritable();
    await writable.write(y);
    await writable.close();
    status('Сохранено в файл: '+new Date().toLocaleTimeString('ru-RU'));
  }catch(err){
    status('Файл не сохранён');
    alert('Не удалось сохранить YAML-файл.\n\nПричина: '+(err&&err.message?err.message:err));
  }
}
function download(){const y=toYaml(data);localStorage.setItem(storageKey,y);const fname=(currentPassport&&currentPassport.fileName)?currentPassport.fileName:FILE_NAME;const blob=new Blob([y],{type:'text/yaml;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);status('Скачан файл '+fname)}
async function openFile(e){const f=e.target.files&&e.target.files[0];if(!f)return;const old=clone(data);try{const text=await f.text();data=normalize(parseData(text));render();save();status('Открыт файл: '+f.name)}catch(err){data=old;render();status('Файл не загружен. Старые данные восстановлены.');alert('Не удалось загрузить YAML. Старые данные восстановлены.\n\nОшибка: '+err.message)}finally{e.target.value=''}}
function parseData(text){const s=String(text||'').trim();if(!s)throw new Error('Файл пустой');try{return JSON.parse(s)}catch(e){}return parseYaml(s)}
function parseYaml(text){const lines=text.replace(/\r/g,'').split('\n');let i=0;const ind=l=>(l.match(/^ */)||[''])[0].length;function strip(l){let q=null;for(let n=0;n<l.length;n++){const c=l[n];if((c==='"'||c==="'")&&l[n-1]!=='\\')q=q===c?null:(q||c);if(c==='#'&&!q)return l.slice(0,n)}return l}function kv(s){const p=s.indexOf(':');return p<0?null:{key:s.slice(0,p).trim(),value:s.slice(p+1).trim()}}function scalar(v){const s=String(v||'').trim();if(s==='true')return true;if(s==='false')return false;if(s==='null')return null;if((s.startsWith('"')&&s.endsWith('"'))||(s.startsWith("'")&&s.endsWith("'")))return s.slice(1,-1);return s}function multi(level,style){const a=[];while(i<lines.length){const raw=lines[i];if(!raw.trim()){a.push('');i++;continue}if(ind(raw)<level)break;a.push(raw.slice(level));i++}return style.startsWith('>')?a.join(' ').trim():a.join('\n').trim()}function block(level){let mode=null;const obj={},arr=[];while(i<lines.length){let raw=strip(lines[i]);if(!raw.trim()){i++;continue}const levelNow=ind(raw);if(levelNow<level)break;if(levelNow>level)break;const line=raw.slice(level);if(line.startsWith('- ')){mode=mode||'array';const itemText=line.slice(2).trim();i++;if(!itemText){arr.push(block(level+2));continue}const first=kv(itemText);if(!first){arr.push(scalar(itemText));continue}const item={};if(['|','|-','>','>-'].includes(first.value))item[first.key]=multi(level+2,first.value);else if(first.value)item[first.key]=scalar(first.value);else item[first.key]=block(level+2);while(i<lines.length){let raw2=strip(lines[i]);if(!raw2.trim()){i++;continue}const ind2=ind(raw2);if(ind2!==level+2)break;const line2=raw2.slice(ind2);if(line2.startsWith('- '))break;const pair=kv(line2);if(!pair)break;i++;if(['|','|-','>','>-'].includes(pair.value))item[pair.key]=multi(ind2+2,pair.value);else if(pair.value)item[pair.key]=scalar(pair.value);else item[pair.key]=block(ind2+2)}arr.push(item)}else{mode=mode||'object';const pair=kv(line);if(!pair)throw new Error('Не могу прочитать строку: '+raw);i++;if(['|','|-','>','>-'].includes(pair.value))obj[pair.key]=multi(level+2,pair.value);else if(pair.value)obj[pair.key]=scalar(pair.value);else obj[pair.key]=block(level+2)}}return mode==='array'?arr:obj}return block(0)}
function toYaml(v,level=0){const pad=' '.repeat(level);if(Array.isArray(v)){return v.map(item=>{if(item&&typeof item==='object'&&!Array.isArray(item)){const entries=Object.entries(item);if(!entries.length)return pad+'- {}';let out=pad+'- '+entries[0][0]+': '+yamlVal(entries[0][1],level+2);entries.slice(1).forEach(([k,val])=>{out+='\n'+' '.repeat(level+2)+k+': '+yamlVal(val,level+2)});return out}return pad+'- '+yamlVal(item,level+2)}).join('\n')}if(v&&typeof v==='object'){return Object.entries(v).map(([k,val])=>pad+k+': '+yamlVal(val,level)).join('\n')}return yamlVal(v,level)}
function yamlVal(v,level){if(Array.isArray(v)||(v&&typeof v==='object'))return '\n'+toYaml(v,level+2);if(typeof v==='boolean')return v?'true':'false';if(v===null||v===undefined)return '';const s=String(v);if(s.includes('\n'))return '|-\n'+s.split('\n').map(x=>' '.repeat(level+2)+x).join('\n');if(s===''||/^[\s]|[\s]$/.test(s)||/[:#\[\]\{\},&*!|>'"%@`]/.test(s))return JSON.stringify(s);return s}
function status(m){document.getElementById('status').innerText=m}

const IDB_NAME='portfolio_panel_db';
const IDB_STORE='handles';
const IDB_ROOT_KEY='rootHandle';
let targetFileHandle=null;
function idbOpen(){return new Promise((resolve,reject)=>{const req=indexedDB.open(IDB_NAME,1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains(IDB_STORE))req.result.createObjectStore(IDB_STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
function idbGet(key){return idbOpen().then(db=>new Promise((resolve,reject)=>{const tx=db.transaction(IDB_STORE,'readonly');const r=tx.objectStore(IDB_STORE).get(key);r.onsuccess=()=>{db.close();resolve(r.result)};r.onerror=()=>{db.close();reject(r.error)}}))}
function idbSet(key,val){return idbOpen().then(db=>new Promise((resolve,reject)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(val,key);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>{db.close();reject(tx.error)}}))}
async function ensureReadWritePermission(handle){
  if(!handle)throw new Error('Нет handle файла или папки');
  let perm='prompt';
  try{perm=await handle.queryPermission({mode:'readwrite'})}catch(e){}
  if(perm!=='granted'){
    try{perm=await handle.requestPermission({mode:'readwrite'})}catch(e){perm='denied'}
  }
  if(perm!=='granted')throw new Error('Браузер не выдал доступ на запись');
}
async function getPassportFileHandleForWrite(){
  const key=currentPassport&&currentPassport.relPath?'passportFile::'+currentPassport.relPath:'';
  if(targetFileHandle){await ensureReadWritePermission(targetFileHandle);return targetFileHandle}
  if(key){
    try{const saved=await idbGet(key);if(saved){await ensureReadWritePermission(saved);targetFileHandle=saved;return targetFileHandle}}catch(e){}
  }
  if(currentPassport&&currentPassport.fileName){
    try{
      const root=await idbGet(IDB_ROOT_KEY);
      if(root){
        await ensureReadWritePermission(root);
        let dir=root;
        if(currentPassport.portfolio)dir=await root.getDirectoryHandle(currentPassport.portfolio,{create:false});
        const fh=await dir.getFileHandle(currentPassport.fileName,{create:false});
        await ensureReadWritePermission(fh);
        targetFileHandle=fh;
        if(key)try{await idbSet(key,fh)}catch(e){}
        return targetFileHandle;
      }
    }catch(e){}
  }
  if(window.showOpenFilePicker){
    const handles=await window.showOpenFilePicker({multiple:false,types:[{description:'YAML passport',accept:{'text/yaml':['.yaml','.yml'],'text/plain':['.yaml','.yml']}}]});
    if(handles&&handles[0]){
      targetFileHandle=handles[0];
      await ensureReadWritePermission(targetFileHandle);
      if(key)try{await idbSet(key,targetFileHandle)}catch(e){}
      return targetFileHandle;
    }
  }
  throw new Error('Не удалось получить доступ к YAML-файлу. Откройте редактор из панели или выберите файл вручную.');
}
function initPassport(){let handoff=null;try{const h=localStorage.getItem(HANDOFF_KEY);if(h)handoff=JSON.parse(h)}catch(e){}
if(handoff&&handoff.relPath){
  currentPassport={portfolio:handoff.portfolio||'',fileName:handoff.fileName||FILE_NAME,relPath:handoff.relPath};
  storageKey='passport::draft::'+handoff.relPath;
  try{sessionStorage.setItem(CURRENT_KEY,JSON.stringify(currentPassport))}catch(e){}
  try{localStorage.removeItem(HANDOFF_KEY)}catch(e){}
  let parsed;try{parsed=normalize(parseData(handoff.yamlText))}catch(e){parsed=clone(defaultData)}
  data=parsed;
  return;
}
let cur=null;try{const c=sessionStorage.getItem(CURRENT_KEY);if(c)cur=JSON.parse(c)}catch(e){}
if(cur&&cur.relPath){
  currentPassport=cur;
  storageKey='passport::draft::'+cur.relPath;
  /* Важно: не загружаем старую копию из localStorage как источник истины.
     Чтобы не перетирать файл кэшем, паспорт нужно открывать из панели заново. */
  data=clone(defaultData);
  status('Откройте паспорт из панели, чтобы загрузить актуальный YAML из файла.');
  return;
}
storageKey=STORAGE_KEY;data=loadSafe()}
function applyPassportChrome(){const back=document.getElementById('backToPanelBtn');const label=document.getElementById('passportLabel');if(currentPassport){back.style.display='';label.style.display='';label.innerText='📋 '+(currentPassport.portfolio?currentPassport.portfolio+' · ':'')+currentPassport.fileName;document.title='Паспорт: '+currentPassport.fileName}else{back.style.display='none';label.style.display='none'}}
document.getElementById('backToPanelBtn').addEventListener('click',function(){window.close();setTimeout(function(){window.location.href='./portfolio_panel.html'},150)});
document.getElementById('saveBtn').addEventListener('click',save);document.getElementById('downloadBtn').addEventListener('click',download);document.getElementById('fileInput').addEventListener('change',openFile);document.getElementById('printBtn').addEventListener('click',()=>window.print());window.addEventListener('error',e=>status('Ошибка JS: '+e.message));render();applyPassportChrome();status(currentPassport?'Паспорт загружен из файла. Изменения будут записаны только по кнопке «Сохранить в файл».':'Готово');
</script>
