summaryCards: 
  - title: Проблема
    text: "Текущий процесс управления ценами недостаточно системный: цены меняются несвоевременно, часть прибыли теряется, выравнивание под конкурентов не контролируется, ручные операции создают ошибки, а причины изменения цены и результат сложно отследить."
  - title: Гипотеза
    text: "Если внедрить Yieldigo как инструмент рекомендаций и управления ценами, процесс станет прозрачнее, сократятся ручные ошибки, повысится выторг, маржинальность и лояльность клиентов, а масштабирование бизнеса станет управляемее."
  - title: Решение сейчас
    text: "Согласовать запуск пилота Yieldigo в утверждённом контуре Dry Food, определить роли владельцев pricing-процесса, подтвердить состав данных, KPI пилота и правила перехода к масштабированию после подтверждённого эффекта."
    decision: true
effectCards: 
  - title: Ожидаемый эффект
    list: 
      - Снижение количества ошибок при смене цен.
      - Рекомендация оптимальных цен системой.
      - Автоматизированное выравнивание под конкурентов для выбранных позиций.
      - Снижение нагрузки на категорийных менеджеров.
      - "Появление прозрачной истории: "кто, что и зачем изменил.\\\\\\\\\\\\\\\""
      - Рост маржинальности и клиентской лояльности.
      - Снижение нагрузки на торговые точки при смене ценников.
  - title: Ключевые риски
    list: 
      - "Низкое качество исходных данных по ценам, продажам и истории изменений."
      - "Неустойчивый процесс ведения номенклатуры, складов и ассортимента."
      - Отсутствие утверждённых политик акционной деятельности.
      - Отсутствие утверждённых политик оптовых продаж.
      - Несогласованная методика мониторинга цен конкурентов.
      - Сложности синхронизации цен между Fresh и Dry Food.
  - title: Следующий шаг
    text: "Принять решение о запуске Yieldigo для пилотного контура Dry Food, утвердить KPI, ответственных, состав данных, календарный план и критерии масштабирования."
criteriaCards: 
  - title: Success Criteria
    text: "Для форматов «Рулька», «Щедрик» и Cash&Carry ценообразование переводится на управляемую модель через Yieldigo. Система показывает стабильную работу, рекомендации применимы бизнесом, KPI пилота достигнуты, а процесс не зависит от Excel как основного инструмента управления."
  - title: Stop Criteria
    text: "Новая модель приводит к снижению прибыльности, создаёт неконтролируемые ошибки в ценах, не принимается бизнес-пользователями или не может быть поддержана из-за качества данных и интеграционных ограничений."
gates: 
  - code: Gate 0
    title: Гипотеза подтверждена
    description: "Есть паспорт проекта, определён владелец и заказчик, согласован пилотный контур."
    owner: Заказчик / Product Owner / PMO
  - code: Gate 1
    title: Пилот согласован
    description: "Определены пилотные ТТ, регион, роли, KPI пилота и состав данных."
    owner: Спонсор / Владелец проекта
  - code: Gate 2
    title: Интеграция проведена
    description: "Данные стабильно передаются, принимаются и проходят контроль качества."
    owner: IT
  - code: Gate 3
    title: Пилот multibuy запущен
    description: "Запущен модуль multibuy, проведено обучение, принято решение: масштабировать, доработать или остановить."
    owner: Владелец проекта / PMO / IT
  - code: Gate 4
    title: Пилот регулярных цен запущен
    description: "Данные очищены, модуль работает, KPI пилота отслеживаются и подтверждаются."
    owner: Спонсор / Заказчик / Владелец проекта
  - code: Gate 5
    title: Регулярное ценообразование масштабировано
    description: "Запущено регулярное ценообразование на всех согласованных магазинах, принято решение двигаться дальше."
    owner: Спонсор / Заказчик
  - code: Gate 6
    title: Интеграция акционного модуля
    description: "Данные по акциям стабильно передаются, принимаются и контролируются."
    owner: IT
  - code: Gate 7
    title: Пилот акционных цен
    description: "Запущен пилот акционных цен, принято решение: масштабировать, доработать или остановить."
    owner: Спонсор / Заказчик
  - code: Gate 8
    title: Модуль акций масштабирован
    description: Акционный модуль запущен для всех согласованных магазинов и категорий.
    owner: Спонсор / Заказчик
